<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Cron 任务监控面板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0A0A0A;
            --bg-secondary: #1A1A1A;
            --bg-card: #0F0F0F;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --accent: #0066FF;
            --success: #00CC66;
            --warning: #FFCC00;
            --error: #FF3333;
            --info: #0099FF;
            --border: #2A2A2A;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .last-updated {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .refresh-status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .refresh-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Stats Cards */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-total .stat-value { color: var(--accent); }
        .stat-success .stat-value { color: var(--success); }
        .stat-error .stat-value { color: var(--error); }
        .stat-running .stat-value { color: var(--info); }
        .stat-idle .stat-value { color: var(--text-secondary); }

        /* Filters */
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label {
            color: var(--text-secondary);
            font-size: 14px;
            white-space: nowrap;
        }

        .filter-select {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        .filter-select:focus {
            border-color: var(--accent);
        }

        .search-input {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            min-width: 250px;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        /* Table */
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--bg-secondary);
        }

        th {
            padding: 16px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        th:hover {
            background: var(--border);
        }

        th .sort-icon {
            margin-left: 8px;
            opacity: 0.5;
        }

        th.sorted .sort-icon {
            opacity: 1;
            color: var(--accent);
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: var(--bg-secondary);
        }

        td {
            padding: 16px;
            font-size: 14px;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-success {
            background: rgba(0, 204, 102, 0.15);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .status-success .status-dot {
            background: var(--success);
        }

        .status-error {
            background: rgba(255, 51, 51, 0.15);
            color: var(--error);
            border: 1px solid var(--error);
        }

        .status-error .status-dot {
            background: var(--error);
        }

        .status-running {
            background: rgba(0, 153, 255, 0.15);
            color: var(--info);
            border: 1px solid var(--info);
        }

        .status-running .status-dot {
            background: var(--info);
        }

        .status-idle {
            background: rgba(160, 160, 160, 0.15);
            color: var(--text-secondary);
            border: 1px solid var(--text-secondary);
        }

        .status-idle .status-dot {
            background: var(--text-secondary);
            animation: none;
        }

        /* Agent ID Badge */
        .agent-badge {
            display: inline-block;
            padding: 4px 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            font-family: 'Monaco', 'Menlo', monospace;
        }

        /* Schedule Expression */
        .schedule-expr {
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            color: var(--accent);
            background: rgba(0, 102, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Manual Refresh Button */
        .refresh-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .refresh-btn:hover {
            background: #0052CC;
        }

        .refresh-btn:active {
            transform: scale(0.98);
        }

        /* Progress Bar */
        .refresh-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: var(--accent);
            transition: width 0.3s;
            z-index: 1000;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .filters {
                flex-direction: column;
            }

            .search-input {
                min-width: 100%;
            }

            .table-container {
                overflow-x: auto;
            }

            table {
                min-width: 800px;
            }
        }
    </style>
</head>
<body>
    <div class="refresh-progress" id="refreshProgress"></div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🤖 OpenClaw Cron 任务监控面板</h1>
            <div class="header-right">
                <span class="last-updated" id="lastUpdated">最后更新：--</span>
                <div class="refresh-status">
                    <span class="refresh-dot"></span>
                    <span>30 秒自动刷新</span>
                </div>
                <button class="refresh-btn" onclick="manualRefresh()">立即刷新</button>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-container">
            <div class="stat-card stat-total">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">总任务数</div>
            </div>
            <div class="stat-card stat-success">
                <div class="stat-value" id="successCount">0</div>
                <div class="stat-label">成功</div>
            </div>
            <div class="stat-card stat-error">
                <div class="stat-value" id="errorCount">0</div>
                <div class="stat-label">失败</div>
            </div>
            <div class="stat-card stat-running">
                <div class="stat-value" id="runningCount">0</div>
                <div class="stat-label">运行中</div>
            </div>
            <div class="stat-card stat-idle">
                <div class="stat-value" id="idleCount">0</div>
                <div class="stat-label">空闲</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-group">
                <label>状态筛选:</label>
                <select class="filter-select" id="statusFilter" onchange="applyFilters()">
                    <option value="all">全部状态</option>
                    <option value="ok">成功</option>
                    <option value="error">失败</option>
                    <option value="running">运行中</option>
                    <option value="idle">空闲</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Agent 筛选:</label>
                <select class="filter-select" id="agentFilter" onchange="applyFilters()">
                    <option value="all">全部 Agent</option>
                </select>
            </div>
            <div class="filter-group">
                <label>排序:</label>
                <select class="filter-select" id="sortOrder" onchange="applyFilters()">
                    <option value="name-asc">名称 (A-Z)</option>
                    <option value="name-desc">名称 (Z-A)</option>
                    <option value="status">状态优先级</option>
                    <option value="lastRun-desc">最后运行时间 (新→旧)</option>
                    <option value="lastRun-asc">最后运行时间 (旧→新)</option>
                </select>
            </div>
            <input type="text" class="search-input" id="searchInput" placeholder="搜索任务名称..." oninput="applyFilters()">
        </div>

        <!-- Table -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th onclick="sortBy('name')">任务名称 <span class="sort-icon">↕</span></th>
                        <th onclick="sortBy('schedule')">调度表达式 <span class="sort-icon">↕</span></th>
                        <th onclick="sortBy('status')">状态 <span class="sort-icon">↕</span></th>
                        <th onclick="sortBy('lastRun')">上次运行时间 <span class="sort-icon">↕</span></th>
                        <th onclick="sortBy('nextRun')">下次运行时间 <span class="sort-icon">↕</span></th>
                        <th onclick="sortBy('agentId')">Agent ID <span class="sort-icon">↕</span></th>
                    </tr>
                </thead>
                <tbody id="taskTableBody">
                    <tr>
                        <td colspan="6" class="loading">
                            <div class="spinner"></div>
                            <p>正在加载任务数据...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Global state
        let allTasks = [];
        let filteredTasks = [];
        let currentSort = { field: 'name', order: 'asc' };
        let refreshInterval = null;
        let refreshProgressTimer = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadTasks();
            startAutoRefresh();
        });

        // Load tasks from API
        async function loadTasks() {
            try {
                const response = await fetch('/api/openclaw-cron');
                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                allTasks = data.cron_tasks || [];
                updateStats(data);
                updateAgentFilter();
                applyFilters();
                updateLastUpdated();

            } catch (error) {
                showError('无法加载任务数据：' + error.message);
            }
        }

        // Update statistics
        function updateStats(data) {
            document.getElementById('totalCount').textContent = data.total_count || 0;
            document.getElementById('successCount').textContent = data.success_count || 0;
            document.getElementById('errorCount').textContent = data.error_count || 0;

            const runningCount = allTasks.filter(t => t.status === 'running').length;
            const idleCount = allTasks.filter(t => t.status === 'idle').length;

            document.getElementById('runningCount').textContent = runningCount;
            document.getElementById('idleCount').textContent = idleCount;
        }

        // Update agent filter dropdown
        function updateAgentFilter() {
            const agentFilter = document.getElementById('agentFilter');
            const agents = [...new Set(allTasks.map(t => t.agent_id))].sort();

            agentFilter.innerHTML = '<option value="all">全部 Agent</option>';
            agents.forEach(agent => {
                agentFilter.innerHTML += `<option value="${agent}">${agent}</option>`;
            });
        }

        // Apply filters and sorting
        function applyFilters() {
            const statusFilter = document.getElementById('statusFilter').value;
            const agentFilter = document.getElementById('agentFilter').value;
            const sortOrder = document.getElementById('sortOrder').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            // Filter
            filteredTasks = allTasks.filter(task => {
                const matchStatus = statusFilter === 'all' || task.status === statusFilter;
                const matchAgent = agentFilter === 'all' || task.agent_id === agentFilter;
                const matchSearch = searchTerm === '' ||
                    task.name.toLowerCase().includes(searchTerm) ||
                    task.agent_id.toLowerCase().includes(searchTerm);

                return matchStatus && matchAgent && matchSearch;
            });

            // Sort
            const [field, order] = sortOrder.split('-');
            sortTasks(field, order === 'desc' ? 'desc' : 'asc');

            renderTable();
        }

        // Sort tasks
        function sortTasks(field, order) {
            const statusPriority = { 'error': 0, 'running': 1, 'ok': 2, 'idle': 3 };

            filteredTasks.sort((a, b) => {
                let aVal, bVal;

                switch (field) {
                    case 'name':
                        aVal = a.name.toLowerCase();
                        bVal = b.name.toLowerCase();
                        break;
                    case 'schedule':
                        aVal = a.schedule || '';
                        bVal = b.schedule || '';
                        break;
                    case 'status':
                        aVal = statusPriority[a.status] ?? 99;
                        bVal = statusPriority[b.status] ?? 99;
                        break;
                    case 'lastRun':
                        aVal = a.last_run_raw || 0;
                        bVal = b.last_run_raw || 0;
                        break;
                    case 'nextRun':
                        aVal = a.next_run_raw || 0;
                        bVal = b.next_run_raw || 0;
                        break;
                    case 'agentId':
                        aVal = a.agent_id.toLowerCase();
                        bVal = b.agent_id.toLowerCase();
                        break;
                    default:
                        aVal = a.name.toLowerCase();
                        bVal = b.name.toLowerCase();
                }

                if (aVal < bVal) return order === 'asc' ? -1 : 1;
                if (aVal > bVal) return order === 'asc' ? 1 : -1;
                return 0;
            });

            currentSort = { field, order };
            updateSortIcons(field);
        }

        // Update sort icons in table header
        function updateSortIcons(activeField) {
            const headers = document.querySelectorAll('th');
            headers.forEach((th, index) => {
                const fieldMap = ['name', 'schedule', 'status', 'lastRun', 'nextRun', 'agentId'];
                th.classList.remove('sorted');
                if (fieldMap[index] === activeField) {
                    th.classList.add('sorted');
                }
            });
        }

        // Render table
        function renderTable() {
            const tbody = document.getElementById('taskTableBody');

            if (filteredTasks.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="empty-state">
                            <h3>没有找到匹配的任务</h3>
                            <p>请调整筛选条件后重试</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = filteredTasks.map(task => {
                const statusInfo = getStatusBadge(task.status);
                return `
                    <tr>
                        <td>
                            <strong>${escapeHtml(task.name)}</strong>
                            <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">ID: ${escapeHtml(task.id || '-')}</div>
                        </td>
                        <td><span class="schedule-expr">${escapeHtml(task.schedule || '-')}</span></td>
                        <td>${statusInfo}</td>
                        <td>${escapeHtml(task.last_run || '从未运行')}</td>
                        <td>${escapeHtml(task.next_run || '未计划')}</td>
                        <td><span class="agent-badge">${escapeHtml(task.agent_id)}</span></td>
                    </tr>
                `;
            }).join('');
        }

        // Get status badge HTML
        function getStatusBadge(status) {
            const statusMap = {
                'ok': { class: 'status-success', text: '成功', pulse: true },
                'error': { class: 'status-error', text: '失败', pulse: true },
                'running': { class: 'status-running', text: '运行中', pulse: true },
                'idle': { class: 'status-idle', text: '空闲', pulse: false }
            };

            const info = statusMap[status] || { class: 'status-idle', text: status, pulse: false };
            const dotAnimation = info.pulse ? 'animation: pulse 2s infinite;' : '';

            return `
                <span class="status-badge ${info.class}">
                    <span class="status-dot" style="${dotAnimation}"></span>
                    ${info.text}
                </span>
            `;
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Show error
        function showError(message) {
            const tbody = document.getElementById('taskTableBody');
            tbody.innerHTML = `
                <tr>
                    <td colspan="6" class="empty-state">
                        <h3>❌ 加载失败</h3>
                        <p>${escapeHtml(message)}</p>
                        <button class="refresh-btn" style="margin-top:20px;" onclick="loadTasks()">重试</button>
                    </td>
                </tr>
            `;
        }

        // Update last updated time
        function updateLastUpdated() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('lastUpdated').textContent = `最后更新：${timeStr}`;
        }

        // Manual refresh
        function manualRefresh() {
            loadTasks();
            resetRefreshTimer();
        }

        // Start auto refresh
        function startAutoRefresh() {
            refreshInterval = setInterval(() => {
                loadTasks();
                startRefreshProgress();
            }, 30000); // 30 seconds
        }

        // Reset refresh timer
        function resetRefreshTimer() {
            clearInterval(refreshInterval);
            startAutoRefresh();
        }

        // Show refresh progress bar
        function startRefreshProgress() {
            const progressBar = document.getElementById('refreshProgress');
            progressBar.style.width = '0%';

            let progress = 0;
            refreshProgressTimer = setInterval(() => {
                progress += 5;
                progressBar.style.width = Math.min(progress, 90) + '%';

                if (progress >= 100) {
                    clearInterval(refreshProgressTimer);
                    progressBar.style.width = '100%';
                    setTimeout(() => {
                        progressBar.style.width = '0%';
                    }, 300);
                }
            }, 150);
        }

        // Sort by field (for table header clicks)
        function sortBy(field) {
            const order = currentSort.field === field && currentSort.order === 'asc' ? 'desc' : 'asc';
            sortTasks(field, order);
            document.getElementById('sortOrder').value = `${field}-${order}`;
            renderTable();
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (refreshInterval) clearInterval(refreshInterval);
            if (refreshProgressTimer) clearInterval(refreshProgressTimer);
        });
    </script>
</body>
</html>
