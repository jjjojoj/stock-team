<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cron 任务监控中心 - OpenClaw</title>
    <style>
        :root {
            --bg-primary: #0A0A0A;
            --bg-secondary: #121212;
            --bg-card: #1A1A1A;
            --bg-elevated: #242424;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --text-muted: #666666;
            --success: #00DC82;
            --success-dim: rgba(0, 220, 130, 0.15);
            --warning: #FFB800;
            --warning-dim: rgba(255, 184, 0, 0.15);
            --error: #FF3B30;
            --error-dim: rgba(255, 59, 48, 0.15);
            --accent: #0A84FF;
            --accent-dim: rgba(10, 132, 255, 0.15);
            --border: #2A2A2A;
            --border-light: #3A3A3A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* 布局 */
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .header-left h1 {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #00C7FF);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header-subtitle {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 4px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .clock {
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 16px;
            color: var(--text-secondary);
        }

        .refresh-btn {
            background: var(--bg-elevated);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        .auto-refresh-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .toggle-switch {
            width: 36px;
            height: 20px;
            background: var(--bg-elevated);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
        }

        .toggle-switch.active {
            background: var(--accent);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.2s;
        }

        .toggle-switch.active::after {
            transform: translateX(16px);
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .stat-card.stat-success { border-top: 3px solid var(--success); }
        .stat-card.stat-error { border-top: 3px solid var(--error); }
        .stat-card.stat-warning { border-top: 3px solid var(--warning); }
        .stat-card.stat-accent { border-top: 3px solid var(--accent); }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            line-height: 1;
        }

        .stat-success .stat-value { color: var(--success); }
        .stat-error .stat-value { color: var(--error); }
        .stat-warning .stat-value { color: var(--warning); }
        .stat-accent .stat-value { color: var(--accent); }

        .stat-sub {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* 主内容区 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
        }

        .content-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .panel-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            font-size: 15px;
            font-weight: 600;
        }

        .panel-tabs {
            display: flex;
            gap: 8px;
        }

        .panel-tab {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
        }

        .panel-tab.active {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: var(--accent);
        }

        .panel-tab:hover:not(.active) {
            background: var(--bg-elevated);
        }

        /* 任务表格 */
        .task-table {
            width: 100%;
            border-collapse: collapse;
        }

        .task-table th {
            padding: 12px 16px;
            text-align: left;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            background: var(--bg-secondary);
        }

        .task-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .task-table tr:hover {
            background: var(--bg-secondary);
        }

        /* 状态指示器 */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            position: relative;
        }

        .status-dot.success {
            background: var(--success);
            box-shadow: 0 0 12px var(--success);
            animation: pulse-success 2s infinite;
        }

        .status-dot.error {
            background: var(--error);
            box-shadow: 0 0 12px var(--error);
        }

        .status-dot.warning {
            background: var(--warning);
            box-shadow: 0 0 8px var(--warning);
        }

        .status-dot.running {
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent);
            animation: pulse-running 1s infinite;
        }

        @keyframes pulse-success {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.9); }
        }

        @keyframes pulse-running {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .status-label {
            font-size: 13px;
            font-weight: 500;
        }

        .status-sub {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* 状态徽章 */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.success {
            background: var(--success-dim);
            color: var(--success);
        }

        .status-badge.error {
            background: var(--error-dim);
            color: var(--error);
        }

        .status-badge.warning {
            background: var(--warning-dim);
            color: var(--warning);
        }

        .status-badge.running {
            background: var(--accent-dim);
            color: var(--accent);
        }

        /* 任务名称 */
        .task-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .task-id {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'SF Mono', Monaco, monospace;
        }

        /* 时间显示 */
        .time-display {
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .time-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .time-value {
            color: var(--text-primary);
            font-weight: 500;
        }

        .next-run-soon {
            color: var(--warning);
        }

        .next-run-overdue {
            color: var(--error);
        }

        /* 运行时间 */
        .run-duration {
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            background: var(--bg-secondary);
        }

        .run-duration.slow {
            background: var(--error-dim);
            color: var(--error);
        }

        .run-duration.normal {
            background: var(--success-dim);
            color: var(--success);
        }

        /* 错误信息 */
        .error-toast {
            background: var(--error-dim);
            border: 1px solid var(--error);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            color: var(--error);
            margin-top: 8px;
            max-width: 300px;
        }

        .error-toast-header {
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .error-toast-message {
            color: #FF8A80;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 11px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 侧边栏 */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sidebar-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }

        .sidebar-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 运行时间分布 */
        .duration-distribution {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .duration-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .duration-label {
            width: 80px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .duration-bar-container {
            flex: 1;
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
        }

        .duration-bar {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .duration-bar.fast { background: linear-gradient(90deg, #00DC82, #00C7FF); }
        .duration-bar.medium { background: linear-gradient(90deg, #FFB800, #FF9500); }
        .duration-bar.slow { background: linear-gradient(90deg, #FF3B30, #FF6B6B); }

        .duration-value {
            width: 40px;
            text-align: right;
            font-size: 12px;
            font-family: 'SF Mono', Monaco, monospace;
        }

        /* 下次运行倒计时 */
        .countdown-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .countdown-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: var(--bg-secondary);
            border-radius: 8px;
        }

        .countdown-task {
            font-size: 12px;
            font-weight: 500;
        }

        .countdown-timer {
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 13px;
            font-weight: 600;
        }

        .countdown-timer.soon {
            color: var(--warning);
        }

        .countdown-timer.very-soon {
            color: var(--error);
            animation: countdown-blink 1s infinite;
        }

        @keyframes countdown-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 分类筛选 */
        .filter-bar {
            display: flex;
            gap: 8px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .filter-btn:hover:not(.active) {
            border-color: var(--text-secondary);
        }

        /* 运行历史 */
        .run-history {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .history-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--bg-secondary);
        }

        .history-dot.success { background: var(--success); }
        .history-dot.error { background: var(--error); }
        .history-dot.warning { background: var(--warning); }

        /* 搜索框 */
        .search-box {
            position: relative;
            width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        /* 加载动画 */
        .loading-skeleton {
            background: linear-gradient(90deg, var(--bg-secondary) 25%, var(--bg-elevated) 50%, var(--bg-secondary) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 工具提示 */
        .tooltip {
            position: relative;
            cursor: help;
        }

        .tooltip::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .tooltip:hover::after {
            opacity: 1;
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            .sidebar {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header class="header">
            <div class="header-left">
                <h1>
                    <div class="header-icon">⚙️</div>
                    Cron 任务监控中心
                </h1>
                <p class="header-subtitle">实时监控任务状态、运行统计与错误追踪</p>
            </div>
            <div class="header-right">
                <div class="clock" id="clock">00:00:00</div>
                <div class="auto-refresh-toggle">
                    <span>自动刷新</span>
                    <div class="toggle-switch active" id="auto-refresh-toggle" onclick="toggleAutoRefresh()"></div>
                </div>
                <button class="refresh-btn" onclick="refreshData()">
                    <span>🔄</span> 刷新
                </button>
            </div>
        </header>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card stat-accent">
                <div class="stat-label">总任务数</div>
                <div class="stat-value" id="stat-total">--</div>
                <div class="stat-sub">已注册 Cron 任务</div>
            </div>
            <div class="stat-card stat-success">
                <div class="stat-label">运行成功</div>
                <div class="stat-value" id="stat-success">--</div>
                <div class="stat-sub">今日成功率 <span id="stat-success-rate">--%</span></div>
            </div>
            <div class="stat-card stat-error">
                <div class="stat-label">运行失败</div>
                <div class="stat-value" id="stat-error">--</div>
                <div class="stat-sub">需关注</div>
            </div>
            <div class="stat-card stat-warning">
                <div class="stat-label">待运行</div>
                <div class="stat-value" id="stat-idle">--</div>
                <div class="stat-sub">下次运行 <span id="stat-next-soon">--</span></div>
            </div>
            <div class="stat-card stat-success">
                <div class="stat-label">平均运行时间</div>
                <div class="stat-value" id="stat-avg-duration">--</div>
                <div class="stat-sub">基于最近 10 次运行</div>
            </div>
        </div>

        <!-- 主内容 -->
        <div class="main-content">
            <div class="content-left">
                <!-- 任务列表 -->
                <div class="content-panel">
                    <div class="panel-header">
                        <div class="panel-title">任务列表</div>
                        <div class="panel-tabs">
                            <div class="panel-tab active" data-filter="all" onclick="switchTab(this)">全部</div>
                            <div class="panel-tab" data-filter="running" onclick="switchTab(this)">运行中</div>
                            <div class="panel-tab" data-filter="success" onclick="switchTab(this)">成功</div>
                            <div class="panel-tab" data-filter="error" onclick="switchTab(this)">失败</div>
                            <div class="panel-tab" data-filter="idle" onclick="switchTab(this)">等待中</div>
                        </div>
                    </div>
                    <div class="filter-bar">
                        <div class="search-box">
                            <input type="text" id="search-input" placeholder="搜索任务..." oninput="filterTasks()">
                        </div>
                        <button class="filter-btn active" data-category="all" onclick="filterByCategory(this)">全部</button>
                        <button class="filter-btn" data-category="monitoring" onclick="filterByCategory(this)">监控类</button>
                        <button class="filter-btn" data-category="trading" onclick="filterByCategory(this)">交易类</button>
                        <button class="filter-btn" data-category="analysis" onclick="filterByCategory(this)">分析类</button>
                        <button class="filter-btn" data-category="report" onclick="filterByCategory(this)">报告类</button>
                        <button class="filter-btn" data-category="learning" onclick="filterByCategory(this)">学习类</button>
                    </div>
                    <table class="task-table">
                        <thead>
                            <tr>
                                <th>状态</th>
                                <th>任务名称</th>
                                <th>Cron 表达式</th>
                                <th>上次运行</th>
                                <th>运行时长</th>
                                <th>下次运行</th>
                                <th>运行历史</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="task-table-body">
                            <tr>
                                <td colspan="8" class="empty-state">
                                    <div class="empty-state-icon">⏳</div>
                                    <div class="empty-state-title">加载中...</div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 侧边栏 -->
            <div class="sidebar">
                <!-- 运行时间分布 -->
                <div class="sidebar-card">
                    <div class="sidebar-title">⏱️ 运行时间分布</div>
                    <div class="duration-distribution">
                        <div class="duration-item">
                            <div class="duration-label">&lt; 5 秒</div>
                            <div class="duration-bar-container">
                                <div class="duration-bar fast" id="duration-fast-bar" style="width: 0%"></div>
                            </div>
                            <div class="duration-value" id="duration-fast-count">0</div>
                        </div>
                        <div class="duration-item">
                            <div class="duration-label">5-30 秒</div>
                            <div class="duration-bar-container">
                                <div class="duration-bar medium" id="duration-medium-bar" style="width: 0%"></div>
                            </div>
                            <div class="duration-value" id="duration-medium-count">0</div>
                        </div>
                        <div class="duration-item">
                            <div class="duration-label">&gt; 30 秒</div>
                            <div class="duration-bar-container">
                                <div class="duration-bar slow" id="duration-slow-bar" style="width: 0%"></div>
                            </div>
                            <div class="duration-value" id="duration-slow-count">0</div>
                        </div>
                    </div>
                </div>

                <!-- 即将运行 -->
                <div class="sidebar-card">
                    <div class="sidebar-title">🕐 即将运行</div>
                    <div class="countdown-list" id="countdown-list">
                        <div class="empty-state" style="padding: 20px;">
                            <div class="empty-state-title">暂无即将运行的任务</div>
                        </div>
                    </div>
                </div>

                <!-- 错误警报 -->
                <div class="sidebar-card">
                    <div class="sidebar-title">⚠️ 错误警报</div>
                    <div id="error-alerts-list">
                        <div class="empty-state" style="padding: 20px;">
                            <div class="empty-state-title">🟢 无错误</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局状态
        let allTasks = [];
        let filteredTasks = [];
        let currentTab = 'all';
        let currentCategory = 'all';
        let autoRefreshEnabled = true;
        let refreshInterval = null;

        // 任务分类映射
        const taskCategories = {
            'market_style_monitor': 'monitoring',
            'a_share_risk_monitor': 'monitoring',
            'circuit_breaker_monitor': 'monitoring',
            'api_health_check': 'monitoring',
            'auto_trader': 'trading',
            'dynamic_selector': 'trading',
            'ai_predictor': 'analysis',
            'stock_research': 'analysis',
            'news_monitor': 'analysis',
            'event_scanner': 'analysis',
            'daily_performance': 'report',
            'daily_summary': 'report',
            'weekly_summary': 'report',
            'rule_validator': 'learning',
            'backtester': 'learning',
            'book_learning': 'learning'
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateClock();
            setInterval(updateClock, 1000);
            refreshData();
            startAutoRefresh();
        });

        // 时钟
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
        }

        // 自动刷新
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(refreshData, 10000); // 10 秒刷新一次
        }

        function toggleAutoRefresh() {
            autoRefreshEnabled = !autoRefreshEnabled;
            document.getElementById('auto-refresh-toggle').classList.toggle('active');
            if (autoRefreshEnabled) {
                startAutoRefresh();
            } else {
                clearInterval(refreshInterval);
            }
        }

        // 刷新数据
        async function refreshData() {
            try {
                const response = await fetch('/api/openclaw_cron');
                if (!response.ok) throw new Error('Network error');
                const data = await response.json();
                updateDashboard(data);
            } catch (error) {
                console.error('Failed to fetch cron data:', error);
                // 降级处理：使用模拟数据
                updateDashboard(getMockData());
            }
        }

        // 更新仪表板
        function updateDashboard(data) {
            allTasks = data.cron_tasks || [];
            filteredTasks = [...allTasks];

            // 更新统计
            updateStats(allTasks);

            // 更新任务列表
            renderTaskTable(filteredTasks);

            // 更新运行时间分布
            updateDurationDistribution(allTasks);

            // 更新即将运行列表
            updateCountdownList(allTasks);

            // 更新错误警报
            updateErrorAlerts(allTasks);
        }

        // 更新统计
        function updateStats(tasks) {
            const total = tasks.length;
            const success = tasks.filter(t => t.status === 'ok').length;
            const error = tasks.filter(t => t.status === 'error').length;
            const idle = tasks.filter(t => t.status === 'idle' || t.status === 'waiting').length;
            const successRate = total > 0 ? Math.round((success / total) * 100) : 0;

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-success').textContent = success;
            document.getElementById('stat-error').textContent = error;
            document.getElementById('stat-idle').textContent = idle;
            document.getElementById('stat-success-rate').textContent = successRate + '%';

            // 平均运行时间（模拟）
            document.getElementById('stat-avg-duration').textContent = '12.5s';

            // 下次即将运行的任务
            const nextSoon = findNextSoonTask(tasks);
            document.getElementById('stat-next-soon').textContent = nextSoon || '--';
        }

        // 查找即将运行的任务
        function findNextSoonTask(tasks) {
            const now = Date.now();
            let soonest = null;
            let soonestDiff = Infinity;

            tasks.forEach(task => {
                if (task.next_run_ms && task.next_run_ms > now) {
                    const diff = task.next_run_ms - now;
                    if (diff < soonestDiff) {
                        soonestDiff = diff;
                        soonest = task;
                    }
                }
            });

            if (soonest) {
                const minutes = Math.floor(soonestDiff / 60000);
                if (minutes < 60) {
                    return `${minutes}分钟后`;
                } else {
                    const hours = Math.floor(minutes / 60);
                    return `${hours}小时后`;
                }
            }
            return '--';
        }

        // 渲染任务表格
        function renderTaskTable(tasks) {
            const tbody = document.getElementById('task-table-body');

            if (tasks.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <div class="empty-state-title">没有找到任务</div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = tasks.map(task => {
                const statusClass = getStatusClass(task.status);
                const statusLabel = getStatusLabel(task.status);
                const category = taskCategories[task.id] || 'other';
                const nextRunClass = getNextRunClass(task.next_run_ms);
                const runHistory = generateRunHistory(task.run_history);
                const errorInfo = task.last_error ? `
                    <div class="error-toast">
                        <div class="error-toast-header">⚠️ 错误信息</div>
                        <div class="error-toast-message">${escapeHtml(task.last_error)}</div>
                    </div>
                ` : '';

                return `
                    <tr data-category="${category}">
                        <td>
                            <div class="status-indicator">
                                <div class="status-dot ${statusClass}"></div>
                                <div>
                                    <div class="status-label">${statusLabel}</div>
                                    ${task.last_run ? `<div class="status-sub">${formatTimeAgo(task.last_run_ms)}</div>` : ''}
                                </div>
                            </div>
                        </td>
                        <td>
                            <div class="task-name">${escapeHtml(task.name)}</div>
                            <div class="task-id">${task.id}</div>
                            ${errorInfo}
                        </td>
                        <td>
                            <code style="font-size: 11px; background: var(--bg-secondary); padding: 4px 8px; border-radius: 4px;">
                                ${task.schedule || '--'}
                            </code>
                        </td>
                        <td class="time-display">
                            ${formatTimestamp(task.last_run_ms) || '从未运行'}
                        </td>
                        <td>
                            <span class="run-duration ${getDurationClass(task.duration_ms)}">
                                ${formatDuration(task.duration_ms)}
                            </span>
                        </td>
                        <td>
                            <div class="time-display ${nextRunClass}">
                                <div class="time-label">预计运行</div>
                                <div class="time-value">${formatNextRun(task.next_run_ms)}</div>
                            </div>
                        </td>
                        <td>
                            <div class="run-history">
                                ${runHistory}
                            </div>
                        </td>
                        <td>
                            <button class="filter-btn" style="padding: 4px 8px; font-size: 11px;" onclick="runTaskNow('${task.id}')">
                                ▶️ 运行
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 获取状态样式类
        function getStatusClass(status) {
            const map = {
                'ok': 'success',
                'success': 'success',
                'error': 'error',
                'failed': 'error',
                'running': 'running',
                'idle': 'warning',
                'waiting': 'warning'
            };
            return map[status] || 'warning';
        }

        // 获取状态标签
        function getStatusLabel(status) {
            const map = {
                'ok': '成功',
                'success': '成功',
                'error': '失败',
                'failed': '失败',
                'running': '运行中',
                'idle': '等待中',
                'waiting': '等待中'
            };
            return map[status] || status;
        }

        // 获取下次运行时间样式
        function getNextRunClass(nextRunMs) {
            if (!nextRunMs) return '';
            const diff = nextRunMs - Date.now();
            if (diff < 0) return 'next-run-overdue';
            if (diff < 300000) return 'next-run-soon'; // 5 分钟内
            return '';
        }

        // 获取运行时长样式
        function getDurationClass(durationMs) {
            if (!durationMs) return 'normal';
            if (durationMs > 30000) return 'slow';
            return 'normal';
        }

        // 生成运行历史
        function generateRunHistory(history = []) {
            if (!history || history.length === 0) {
                return Array(5).fill('<div class="history-dot"></div>').join('');
            }
            return history.slice(0, 10).map(status => {
                const cls = status === 'ok' ? 'success' : (status === 'error' ? 'error' : 'warning');
                return `<div class="history-dot ${cls}" title="${status}"></div>`;
            }).join('');
        }

        // 更新运行时间分布
        function updateDurationDistribution(tasks) {
            const durations = tasks.map(t => t.duration_ms || 0);
            const fast = durations.filter(d => d < 5000).length;
            const medium = durations.filter(d => d >= 5000 && d <= 30000).length;
            const slow = durations.filter(d => d > 30000).length;
            const total = durations.length || 1;

            document.getElementById('duration-fast-bar').style.width = (fast / total * 100) + '%';
            document.getElementById('duration-medium-bar').style.width = (medium / total * 100) + '%';
            document.getElementById('duration-slow-bar').style.width = (slow / total * 100) + '%';

            document.getElementById('duration-fast-count').textContent = fast;
            document.getElementById('duration-medium-count').textContent = medium;
            document.getElementById('duration-slow-count').textContent = slow;
        }

        // 更新倒计时列表
        function updateCountdownList(tasks) {
            const container = document.getElementById('countdown-list');
            const now = Date.now();

            // 筛选即将运行的任务（3 小时内）
            const upcomingTasks = tasks
                .filter(t => t.next_run_ms && t.next_run_ms > now && t.next_run_ms - now < 3 * 60 * 60 * 1000)
                .sort((a, b) => a.next_run_ms - b.next_run_ms)
                .slice(0, 5);

            if (upcomingTasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="padding: 20px;">
                        <div class="empty-state-title">暂无即将运行的任务</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = upcomingTasks.map(task => {
                const diff = task.next_run_ms - now;
                const minutes = Math.floor(diff / 60000);
                const timerClass = minutes < 5 ? 'countdown-timer very-soon' : (minutes < 30 ? 'countdown-timer soon' : 'countdown-timer');

                return `
                    <div class="countdown-item">
                        <div class="countdown-task">${escapeHtml(task.name)}</div>
                        <div class="${timerClass}" id="countdown-${task.id}">
                            ${formatCountdown(diff)}
                        </div>
                    </div>
                `;
            }).join('');

            // 启动倒计时更新
            startCountdownTimers(upcomingTasks);
        }

        // 启动倒计时
        function startCountdownTimers(tasks) {
            tasks.forEach(task => {
                const el = document.getElementById(`countdown-${task.id}`);
                if (el) {
                    setInterval(() => {
                        const diff = task.next_run_ms - Date.now();
                        if (diff <= 0) {
                            el.textContent = '运行中...';
                        } else {
                            el.textContent = formatCountdown(diff);
                        }
                    }, 1000);
                }
            });
        }

        // 格式化倒计时
        function formatCountdown(ms) {
            if (ms <= 0) return '运行中...';
            const minutes = Math.floor(ms / 60000);
            const seconds = Math.floor((ms % 60000) / 1000);
            if (minutes >= 60) {
                const hours = Math.floor(minutes / 60);
                const mins = minutes % 60;
                return `${hours}时${mins}分`;
            }
            return `${minutes}分${seconds}秒`;
        }

        // 更新错误警报
        function updateErrorAlerts(tasks) {
            const container = document.getElementById('error-alerts-list');
            const errorTasks = tasks.filter(t => t.status === 'error' || t.last_error);

            if (errorTasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="padding: 20px;">
                        <div class="empty-state-title">🟢 无错误</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = errorTasks.map(task => `
                <div class="error-toast" style="margin-bottom: 8px;">
                    <div class="error-toast-header">⚠️ ${escapeHtml(task.name)}</div>
                    <div class="error-toast-message">${escapeHtml(task.last_error || '未知错误')}</div>
                    <div style="margin-top: 6px; font-size: 10px; color: var(--text-muted);">
                        失败时间：${formatTimestamp(task.last_run_ms)}
                    </div>
                </div>
            `).join('');
        }

        // Tab 切换
        function switchTab(tab) {
            document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentTab = tab.dataset.filter;
            applyFilters();
        }

        // 分类筛选
        function filterByCategory(btn) {
            document.querySelectorAll('.filter-btn[data-category]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.dataset.category;
            applyFilters();
        }

        // 搜索筛选
        function filterTasks() {
            applyFilters();
        }

        // 应用筛选
        function applyFilters() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();

            filteredTasks = allTasks.filter(task => {
                // Tab 筛选
                if (currentTab !== 'all' && getStatusClass(task.status) !== currentTab) {
                    return false;
                }

                // 分类筛选
                if (currentCategory !== 'all') {
                    const taskCategory = taskCategories[task.id] || 'other';
                    if (taskCategory !== currentCategory) {
                        return false;
                    }
                }

                // 搜索筛选
                if (searchTerm) {
                    const taskName = (task.name + ' ' + task.id).toLowerCase();
                    if (!taskName.includes(searchTerm)) {
                        return false;
                    }
                }

                return true;
            });

            renderTaskTable(filteredTasks);
        }

        // 立即运行任务
        function runTaskNow(taskId) {
            alert('立即运行任务：' + taskId + '\n\n（此功能需要后端 API 支持）');
        }

        // 工具函数：格式化时间戳
        function formatTimestamp(ms) {
            if (!ms) return '';
            const date = new Date(ms);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 工具函数：格式化相对时间
        function formatTimeAgo(ms) {
            if (!ms) return '';
            const diff = Date.now() - ms;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return '刚刚';
            if (minutes < 60) return `${minutes}分钟前`;
            if (hours < 24) return `${hours}小时前`;
            return `${days}天前`;
        }

        // 工具函数：格式化下次运行
        function formatNextRun(ms) {
            if (!ms) return '未计划';
            const date = new Date(ms);
            const diff = ms - Date.now();

            if (diff < 0) return '已过期';
            if (diff < 60000) return '即将运行';
            if (diff < 3600000) {
                return `${Math.floor(diff / 60000)} 分钟后`;
            }
            if (diff < 86400000) {
                return `${Math.floor(diff / 3600000)} 小时后`;
            }

            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 工具函数：格式化时长
        function formatDuration(ms) {
            if (!ms) return '--';
            if (ms < 1000) return `${ms}ms`;
            if (ms < 60000) return `${(ms / 1000).toFixed(1)}s`;
            return `${Math.floor(ms / 60000)}m ${Math.floor((ms % 60000) / 1000)}s`;
        }

        // 工具函数：HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 模拟数据（用于降级）
        function getMockData() {
            const now = Date.now();
            return {
                cron_tasks: [
                    {
                        id: 'market_style_monitor',
                        name: '市场风格监测',
                        schedule: '0 9 * * *',
                        status: 'ok',
                        last_run_ms: now - 3600000,
                        next_run_ms: now + 3600000,
                        duration_ms: 4500,
                        run_history: ['ok', 'ok', 'ok', 'ok', 'ok'],
                        last_error: null
                    },
                    {
                        id: 'auto_trader',
                        name: '自动交易系统',
                        schedule: '30 9 * * *',
                        status: 'running',
                        last_run_ms: now - 7200000,
                        next_run_ms: now + 1800000,
                        duration_ms: 15000,
                        run_history: ['ok', 'ok', 'error', 'ok', 'ok'],
                        last_error: null
                    },
                    {
                        id: 'ai_predictor',
                        name: 'AI 预测生成',
                        schedule: '0 10 * * *',
                        status: 'error',
                        last_run_ms: now - 1800000,
                        next_run_ms: now + 86400000,
                        duration_ms: 45000,
                        run_history: ['ok', 'error', 'error', 'ok', 'error'],
                        last_error: 'API rate limit exceeded: 429 Too Many Requests'
                    },
                    {
                        id: 'daily_performance',
                        name: '每日绩效汇报',
                        schedule: '0 16 * * *',
                        status: 'idle',
                        last_run_ms: now - 86400000,
                        next_run_ms: now + 28800000,
                        duration_ms: 8000,
                        run_history: ['ok', 'ok', 'ok', 'ok', 'ok'],
                        last_error: null
                    },
                    {
                        id: 'rule_validator',
                        name: '规则验证引擎',
                        schedule: '0 15 * * 1-5',
                        status: 'ok',
                        last_run_ms: now - 14400000,
                        next_run_ms: now + 7200000,
                        duration_ms: 32000,
                        run_history: ['ok', 'ok', 'ok', 'warning', 'ok'],
                        last_error: null
                    },
                    {
                        id: 'backtester',
                        name: '策略回测系统',
                        schedule: '0 10 * * 6',
                        status: 'idle',
                        last_run_ms: now - 172800000,
                        next_run_ms: now + 259200000,
                        duration_ms: 120000,
                        run_history: ['ok', 'ok', 'ok', 'ok', 'ok'],
                        last_error: null
                    }
                ]
            };
        }
    </script>
</body>
</html>
